<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Input - CropClimate AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Essential structural styles for the Dashboard/Sidebar layout */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8fcf9;
        }

        .wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            min-width: 260px;
            transition: all 0.3s;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.05);
        }

        .content {
            flex: 1;
            padding: 40px;
            transition: all 0.3s;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            margin-bottom: 5px;
            padding: 10px 15px;
            transition: all 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 500;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        .form-control,
        .form-select {
            padding: 12px 15px;
            border-radius: 8px;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-height: auto;
                padding-bottom: 20px;
            }

            .content {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <nav class="sidebar bg-success text-white p-3 d-flex flex-column">
            <div class="text-center mb-4 mt-2">
                <a href="index.html" class="text-white text-decoration-none">
                    <h4 class="fw-bold mb-0"><i class="bi bi-tree-fill me-2"></i>CropClimate</h4>
                </a>
            </div>

            <hr class="text-white-50">

            <ul class="nav flex-column mt-2 mb-auto">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link">
                        <i class="bi bi-speedometer2 me-2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="climate-input.html" class="nav-link active">
                        <i class="bi bi-cloud-sun me-2"></i> Climate Input
                    </a>
                </li>
                <li class="nav-item">
                    <a href="recommendation.html" class="nav-link">
                        <i class="bi bi-lightbulb me-2"></i> Recommendation
                    </a>
                </li>
            </ul>

            <hr class="text-white-50">

            <ul class="nav flex-column">
                <li class="nav-item">
                    <a href="index.html" class="nav-link text-danger fw-bold">
                        <i class="bi bi-box-arrow-left me-2"></i> Logout
                    </a>
                </li>
            </ul>
        </nav>

        <main class="content">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-dark mb-0">Enter Climate Data 🌦️</h2>
                <span class="text-muted"><i class="bi bi-calendar3 me-1"></i> Today</span>
            </div>

            <div id="alertContainer"></div>

            <div class="card shadow-sm">
                <div class="card-body p-4 p-lg-5">

                    <p class="text-muted mb-4">Input your local environmental metrics to generate a highly accurate,
                        AI-driven crop recommendation.</p>

                    <form id="climateForm">

                        <div class="row g-4">

                            <div class="col-md-6">
                                <label for="temperature" class="form-label fw-semibold">Temperature (°C)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-thermometer-half text-danger"></i></span>
                                    <input type="number" id="temperature" name="temperature"
                                        class="form-control border-start-0" placeholder="e.g. 30.5" step="0.1" required>
                                </div>
                            </div>

                            <div class="
