<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CropClimate AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Modern authentication page styling */
        body.auth-body {
            background: linear-gradient(135deg, #f8fcf9 0%, #e8f5e9 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .auth-card {
            max-width: 450px;
            width: 100%;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background-color: #198754;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }

        .form-control {
            padding: 12px 15px;
            border-radius: 0 8px 8px 0;
        }

        .form-control:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
        }

        .input-group-text {
            border-radius: 8px 0 0 8px;
            background-color: #f8f9fa;
        }

        .btn-register {
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>

<body class="auth-body">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">

        <div class="card auth-card p-4 p-md-5 bg-white">

            <div class="text-center mb-4">
                <div class="brand-icon shadow-sm">
                    <i class="bi bi-tree-fill"></i>
                </div>
                <h3 class="fw-bold text-dark mb-1">Create Account</h3>
                <p class="text-muted">Join CropClimate AI today</p>
            </div>

            <div id="errorMessage" class="alert alert-danger d-none text-center py-2 mb-3" role="alert"></div>
            <div id="successMessage" class="alert alert-success d-none text-center py-2 mb-3" role="alert"></div>

            <form id="registerForm">

                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold text-dark">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="name" placeholder="John Doe"
                            required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold text-dark">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" id="email"
                            placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold text-dark">Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="password"
                            placeholder="Minimum 6 characters" minlength="6" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-success btn-register w-100 shadow-sm mb-4">
                    <i class="bi bi-person-plus me-2"></i> Register Account
                </button>

                <p class="text-center text-muted mb-0">
                    Already have an account?
                    <a href="login.html" class="text-success fw-semibold text-decoration-none">Login</a>
                </p>

            </form>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault(); // Stop standard page reload

            // Get Input values
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Get UI alert elements
            const errorBox = document.getElementById('errorMessage');
            const successBox = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');

            // Reset UI components
            errorBox.classList.add('d-none');
            successBox.classList.add('d-none');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Creating account...';

            try {
                // Post request matching the exact keys required by your Flask endpoint
                const response = await fetch('https://crop-climate-recommendation-system.onrender.com/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success (Status 200)
                    successBox.innerText = data.message || "Registration successful! Redirecting...";
                    successBox.classList.remove('d-none');

                    // Clear inputs upon completion
                    document.getElementById('registerForm').reset();

                    // Smooth transition to login page after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);

                } else {
                    // Operational error from backend (Status 400 - e.g., User already exists)
                    errorBox.innerText = data.message || "Registration failed.";
                    errorBox.classList.remove('d-none');

                    // Restore button state
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-person-plus me-2"></i> Register Account';
                }
            } catch (error) {
                // Connection/Server offline errors
                errorBox.innerText = "Cannot connect to server. Is your Flask app running?";
                errorBox.classList.remove('d-none');

                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-person-plus me-2"></i> Register Account';
            }
        });
    </script>
</body>

</html>
