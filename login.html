<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CropClimate AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Modern authentication page styling */
        body.auth-body {
            background: linear-gradient(135deg, #f8fcf9 0%, #e8f5e9 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .auth-card {
            max-width: 420px;
            width: 100%;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background-color: #198754;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }

        .form-control {
            padding: 12px 15px;
            border-radius: 8px;
        }

        .form-control:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
        }

        .input-group-text {
            border-radius: 8px 0 0 8px;
            background-color: #f8f9fa;
        }

        .form-control {
            border-radius: 0 8px 8px 0;
        }

        .btn-login {
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>

<body class="auth-body">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">

        <div class="card auth-card p-4 p-md-5 bg-white">

            <div class="text-center mb-4">
                <div class="brand-icon shadow-sm">
                    <i class="bi bi-tree-fill"></i>
                </div>
                <h3 class="fw-bold text-dark mb-1">Welcome Back</h3>
                <p class="text-muted">Sign in to manage your crops</p>
            </div>

            <div id="errorMessage" class="alert alert-danger d-none text-center py-2" role="alert">
                Invalid email or password.
            </div>

            <form id="loginForm">

                <div class="mb-4">
                    <label for="email" class="form-label fw-semibold text-dark">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" id="email"
                            placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label fw-semibold text-dark">Password</label>
                        <a href="#" class="text-success text-decoration-none small">Forgot password?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="password"
                            placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-success btn-login w-100 shadow-sm mb-4">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Log In
                </button>

                <p class="text-center text-muted mb-0">
                    Don't have an account?
                    <a href="register.html" class="text-success fw-semibold text-decoration-none">Sign up</a>
                </p>

            </form>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault(); // Prevent traditional form submission

            // Get the UI elements
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');

            // Reset UI state
            errorBox.classList.add('d-none');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Logging in...';

            try {
                // Send data to Flask Backend (Make sure app.py is running!)
                const response = await fetch('https://crop-climate-recommendation-system.onrender.com/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success! Save the user_id so we can use it on the dashboard/climate pages
                    localStorage.setItem('user_id', data.user_id);

                    // Redirect to the dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // Failed login (e.g., wrong password)
                    errorBox.innerText = data.message || "Invalid credentials.";
                    errorBox.classList.remove('d-none');
                }
            } catch (error) {
                // Server is down or network error
                errorBox.innerText = "Cannot connect to server. Is Flask running?";
                errorBox.classList.remove('d-none');
            } finally {
                // Reset button state
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i> Log In';
            }
        });
    </script>
</body>

</html>
