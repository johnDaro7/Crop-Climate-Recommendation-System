<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CropClimate AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Essential structural styles (Consistent with climate-input.html) */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8fcf9;
        }

        .wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            min-width: 260px;
            transition: all 0.3s;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.05);
        }

        .content {
            flex: 1;
            padding: 40px;
            transition: all 0.3s;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            margin-bottom: 5px;
            padding: 10px 15px;
            transition: all 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 500;
        }

        /* Dashboard Specific Styles */
        .stat-card {
            border: none;
            border-radius: 15px;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .bg-light-danger {
            background-color: #ffe5e5;
            color: #dc3545;
        }

        .bg-light-info {
            background-color: #e5f4ff;
            color: #0dcaf0;
        }

        .bg-light-primary {
            background-color: #e5ebff;
            color: #0d6efd;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-height: auto;
                padding-bottom: 20px;
            }

            .content {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <nav class="sidebar bg-success text-white p-3 d-flex flex-column">
            <div class="text-center mb-4 mt-2">
                <a href="index.html" class="text-white text-decoration-none">
                    <h4 class="fw-bold mb-0"><i class="bi bi-tree-fill me-2"></i>CropClimate</h4>
                </a>
            </div>

            <hr class="text-white-50">

            <ul class="nav flex-column mt-2 mb-auto">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link active">
                        <i class="bi bi-speedometer2 me-2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="climate-input.html" class="nav-link">
                        <i class="bi bi-cloud-sun me-2"></i> Climate Input
                    </a>
                </li>
                <li class="nav-item">
                    <a href="recommendation.html" class="nav-link">
                        <i class="bi bi-lightbulb me-2"></i> Recommendation
                    </a>
                </li>
            </ul>

            <hr class="text-white-50">

            <ul class="nav flex-column">
                <li class="nav-item">
                    <a href="#" onclick="localStorage.removeItem('user_id'); window.location.href='index.html';" class="nav-link text-danger fw-bold">
                        <i class="bi bi-box-arrow-left me-2"></i> Logout
                    </a>
                </li>
            </ul>
        </nav>

        <main class="content">

            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <div>
                    <h2 class="fw-bold text-dark mb-1">Welcome back, Farmer 👋</h2>
                    <p class="text-muted mb-0">Here is your farm's latest climate overview.</p>
                </div>
                <div class="d-none d-md-block">
                    <button class="btn btn-outline-success btn-sm"><i class="bi bi-download me-1"></i> Export
                        Data</button>
                </div>
            </div>

            <div class="row g-4 mb-4">

                <div class="col-md-4">
                    <div class="card stat-card shadow-sm h-100 p-3">
                        <div class="card-body d-flex align-items-center">
                            <div class="icon-box bg-light-danger me-3">
                                <i class="bi bi-thermometer-sun"></i>
                            </div>
                            <div>
                                <h6 class="text-muted mb-1 fw-semibold">Avg Temperature</h6>
                                <h3 class="mb-0 fw-bold">30.5<span class="fs-6 text-muted ms-1">°C</span></h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card stat-card shadow-sm h-100 p-3">
                        <div class="card-body d-flex align-items-center">
                            <div class="icon-box bg-light-info me-3">
                                <i class="bi bi-moisture"></i>
                            </div>
                            <div>
                                <h6 class="text-muted mb-1 fw-semibold">Soil Humidity</h6>
                                <h3 class="mb-0 fw-bold">75.0<span class="fs-6 text-muted ms-1">%</span></h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card stat-card shadow-sm h-100 p-3">
                        <div class="card-body
